<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUAORA | İletişim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Poppins:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #E3B778; 
            background: linear-gradient(135deg, #E3B778 0%, #d4a76a 100%);
            background-attachment: fixed;
            margin: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }
        
        .glass-card { 
            background: rgba(250, 226, 156, 0.6); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(150, 75, 0, 0.1); 
        }

        #sideMenu {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* dq-[#] sınıflarını buraya tanımlayabilirsin */
        .dq-\[\#1\] { color: inherit; }
        /* ... gibi */
    </style>
</head>
<body class="min-h-screen flex flex-col">

<div id="sideMenu" class="fixed top-0 left-0 h-full w-0 bg-[#FAE29C] z-[100] overflow-x-hidden border-r border-black/10 shadow-2xl flex flex-col">
    <button onclick="toggleMenu()" class="absolute top-6 right-6 text-2xl font-black text-[#964b00] hover:rotate-90 transition-transform">✕</button>
    
    <div class="mt-12 px-10 flex flex-col h-full items-start text-left"> 
        <div class="relative mb-10 flex flex-col items-start">
            <h2 class="text-3xl font-black text-[#964b00] serif uppercase tracking-tighter">MENU</h2>
            <div class="w-10 h-1 bg-[#964b00]/30 mt-1"></div>
        </div>
        
        <nav class="flex flex-col space-y-4 w-full h-full"> 
            <a href="index.html" class="text-lg font-bold text-[#964b00] hover:translate-x-2 transition-transform uppercase tracking-widest italic flex items-center">
                <span class="text-xs mr-2">←</span> MAIN MENU
            </a>
            
            <div class="flex flex-col space-y-3 pt-2">
                <a href="yeni-gelenler.html" class="text-lg font-bold text-gray-800 hover:text-[#964b00] hover:translate-x-2 transition-all uppercase tracking-widest">New</a>
                
                <div class="flex flex-col">
                    <button onclick="toggleMenuSection('colItems', 'colArrow')" class="flex justify-between items-center text-lg font-bold text-gray-800 hover:text-[#964b00] uppercase tracking-widest focus:outline-none">
                        Collections
                        <span id="colArrow" class="text-[10px] transition-transform duration-300">▼</span>
                    </button>
                    <div id="colItems" class="max-h-0 overflow-hidden transition-all duration-500 ease-in-out flex flex-col pl-4 space-y-2 mt-0 border-l border-[#964b00]/10 ml-1">
                        <a href="#" class="dq-[#1] text-sm font-semibold text-gray-700 hover:text-[#964b00] uppercase tracking-[0.15em] italic pt-3">Noir Edit</a>
                        <a href="#" class="dq-[#2] text-sm font-semibold text-gray-700 hover:text-[#964b00] uppercase tracking-[0.15em] italic">Sun-Kissed</a>
                        <a href="#" class="dq-[#3] text-sm font-semibold text-gray-700 hover:text-[#964b00] uppercase tracking-[0.15em] italic">Velvet Series</a>
                        <a href="#" class="dq-[#4] text-sm font-semibold text-gray-700 hover:text-[#964b00] uppercase tracking-[0.15em] italic pb-1">Essentials</a>
                    </div>
                </div>

                <div class="flex flex-col">
                    <button onclick="toggleMenuSection('swimItems', 'swimArrow')" class="flex justify-between items-center text-lg font-bold text-gray-800 hover:text-[#964b00] uppercase tracking-widest focus:outline-none">
                        Swimsuits
                        <span id="swimArrow" class="text-[10px] transition-transform duration-300">▼</span>
                    </button>
                    <div id="swimItems" class="max-h-0 overflow-hidden transition-all duration-500 ease-in-out flex flex-col pl-4 space-y-2 mt-0 border-l border-[#964b00]/10 ml-1">
                        <a href="#" class="dq-[#5] text-sm font-semibold text-gray-700 hover:text-[#964b00] uppercase tracking-[0.15em] italic pt-3">Classic One Piece</a>
                        <a href="#" class="dq-[#6] text-sm font-semibold text-gray-700 hover:text-[#964b00] uppercase tracking-[0.15em] italic">Cut-Out Design</a>
                        <a href="#" class="dq-[#7] text-sm font-semibold text-gray-700 hover:text-[#964b00] uppercase tracking-[0.15em] italic">Backless Style</a>
                        <a href="#" class="dq-[#8] text-sm font-semibold text-gray-700 hover:text-[#964b00] uppercase tracking-[0.15em] italic pb-1">Sporty Fit</a>
                    </div>
                </div>

                <a href="plaj-aksesuarlari.html" class="text-lg font-bold text-gray-800 hover:text-[#964b00] hover:translate-x-2 transition-all uppercase tracking-widest">Tops</a>
                <a href="bottom.html" class="text-lg font-bold text-gray-800 hover:text-[#964b00] hover:translate-x-2 transition-all uppercase tracking-widest">Bottoms</a>
                
                <a href="iletisim.html" class="text-sm font-medium text-gray-500 hover:text-black hover:translate-x-2 transition-all uppercase tracking-[0.2em] italic pt-2">Connection</a>
            </div>

            <div class="pt-2">
                <hr class="border-[#964b00]/10 mb-4">
                <a href="outlet.html" class="text-lg font-black italic text-red-600 uppercase tracking-widest hover:scale-105 transition-transform inline-block">% Outlet</a>
            </div>

            <div class="mt-auto pt-10 pb-12 w-full">
                <p class="text-[9px] font-bold text-[#964b00]/60 uppercase tracking-[0.3em] mb-4 border-l-2 border-[#964b00]/20 pl-3">FOLLOW US</p>
                <div class="flex flex-col space-y-3 pl-3">
                    <a href="https://www.instagram.com/quaoratr" target="_blank" class="text-[#964b00] font-black underline decoration-1 underline-offset-4 tracking-widest text-xs hover:text-black transition-colors w-fit">INSTAGRAM</a>
                    <a href="https://www.tiktok.com/@quaoratr" target="_blank" class="text-[#964b00] font-black underline decoration-1 underline-offset-4 tracking-widest text-xs hover:text-black transition-colors w-fit">TIKTOK</a>
                </div>
            </div>
        </nav>
    </div>
</div>

    <nav class="p-6 bg-[#FAE29C] shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-6">
            <button onclick="toggleMenu()" class="flex items-center space-x-3 focus:outline-none">
                <div class="space-y-1.5">
                    <span class="block w-6 h-[3px] bg-[#964b00]"></span>
                    <span class="block w-6 h-[3px] bg-[#964b00]"></span>
                    <span class="block w-6 h-[3px] bg-[#964b00]"></span>
                </div>
                <span class="text-[11px] font-black uppercase tracking-widest text-[#964b00]">Menü</span>
            </button>
            <div class="flex flex-col border-l border-[#964b00]/20 pl-6 cursor-pointer" onclick="window.location.href='quaora.html'">
                <h1 class="text-3xl font-black tracking-[0.2em] text-[#964b00] serif uppercase leading-none">QUAORA</h1>
                <p class="text-[10px] tracking-[0.5em] text-gray-600 uppercase mt-1 ml-14 font-semibold italic">Swimwear</p>
            </div>
        </div>
        <div class="w-10"></div> 
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 py-12">
        <div class="glass-card p-8 md:p-12 rounded-[3rem] shadow-2xl max-w-xl w-full border border-white/20">
            <header class="text-center mb-10">
                <h3 class="text-4xl serif italic text-[#964b00] mb-2">Bize Yazın</h3>
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Sorularınız için yanınızdayız</p>
            </header>
            
            <form onsubmit="manuelMail(event)" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase tracking-[0.2em] ml-4 text-[#964b00]/70">Ad Soyad</label>
                    <input type="text" id="ad" required class="w-full bg-white/40 border border-[#964b00]/10 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-[#964b00] transition-all placeholder:text-gray-400 text-sm" placeholder="İsminizi yazın">
                </div>
                
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase tracking-[0.2em] ml-4 text-[#964b00]/70">Telefon</label>
                    <input type="tel" id="tel" required class="w-full bg-white/40 border border-[#964b00]/10 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-[#964b00] transition-all placeholder:text-gray-400 text-sm" placeholder="05XX XXX XX XX">
                </div>

                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase tracking-[0.2em] ml-4 text-[#964b00]/70">Mesajınız</label>
                    <textarea id="msg" rows="4" required class="w-full bg-white/40 border border-[#964b00]/10 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-[#964b00] transition-all placeholder:text-gray-400 text-sm resize-none" placeholder="Size nasıl yardımcı olabiliriz?"></textarea>
                </div>

                <button type="submit" class="w-full bg-[#964b00] text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-black transition-all shadow-lg active:scale-95 text-xs">
                    MAİL TASLAĞI OLUŞTUR
                </button>
            </form>
        </div>
    </main>

    <footer class="py-8 text-center bg-[#FAE29C]/50">
        <p class="text-[9px] text-[#964b00] font-bold uppercase tracking-[0.3em]">© 2026 QUAORA SWIMWEAR</p>
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("sideMenu");
            menu.style.width = (menu.style.width === "300px") ? "0" : "300px";
        }

        // Açılır menüleri yöneten fonksiyon
        function toggleMenuSection(sectionId, arrowId) {
            const content = document.getElementById(sectionId);
            const arrow = document.getElementById(arrowId);
            
            if (content.style.maxHeight === '0px' || content.style.maxHeight === '') {
                content.style.maxHeight = '250px';
                content.style.marginTop = '8px';
                arrow.style.transform = 'rotate(180deg)';
            } else {
                content.style.maxHeight = '0px';
                content.style.marginTop = '0px';
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        function manuelMail(e) {
            e.preventDefault();
            const ad = document.getElementById('ad').value;
            const tel = document.getElementById('tel').value;
            const msg = document.getElementById('msg').value;
            
            const body = `Müşteri Bilgileri:\n------------------\nAd: ${ad}\nTel: ${tel}\n\nMesaj:\n${msg}`;
            
            window.location.href = `mailto:quaoratr@gmail.com?subject=Quaora İletişim Formu&body=${encodeURIComponent(body)}`;
        }
    </script>
</body>
</html>
