<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | QUAORA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Poppins:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #E3B778; 
            background: linear-gradient(135deg, #E3B778 0%, #d4a76a 100%);
            background-attachment: fixed;
            margin: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }
        
        .glass-card { 
            background: rgba(250, 226, 156, 0.6); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
        }

        #sideMenu {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden">

    <div id="menuOverlay" onclick="closeAllPanels()" class="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-[90] hidden transition-opacity"></div>

    <div id="sideMenu" class="fixed top-0 left-0 h-full bg-[#FAE29C] z-[100] w-0 overflow-x-hidden shadow-2xl flex flex-col">
        <div class="p-6 flex justify-between items-center border-b border-[#964b00]/10">
            <h2 class="text-2xl font-black tracking-[0.2em] text-[#964b00] serif uppercase">MENU</h2>
            <button onclick="toggleMenu()" class="text-[#964b00] font-black text-xl px-2 hover:scale-110 transition-transform">✕</button>
        </div>
        <div class="p-6 flex flex-col gap-6 mt-4">
            <a href="index.html" class="text-sm font-black uppercase tracking-widest text-gray-800 hover:text-[#964b00] transition-colors">Ana Sayfa</a>
            <a href="#" class="text-sm font-black uppercase tracking-widest text-[#964b00] transition-colors">İletişim</a>
        </div>
    </div>

    <nav class="p-6 bg-[#FAE29C] shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-6">
            <button onclick="toggleMenu()" class="flex items-center space-x-3 focus:outline-none group">
                <div class="space-y-1.5 group-hover:scale-105 transition-transform">
                    <span class="block w-6 h-[3px] bg-[#964b00]"></span>
                    <span class="block w-6 h-[3px] bg-[#964b00]"></span>
                    <span class="block w-6 h-[3px] bg-[#964b00]"></span>
                </div>
                <span class="text-[11px] font-black uppercase tracking-widest text-[#964b00]">Menu</span>
            </button>
            <div class="flex flex-col border-l border-[#964b00]/20 pl-6 cursor-pointer" onclick="window.location.href='index.html'">
                <h1 class="text-3xl font-black tracking-[0.2em] text-[#964b00] serif uppercase leading-none">QUAORA</h1>
                <p class="text-[10px] tracking-[0.5em] text-gray-600 uppercase mt-1 ml-14 font-semibold italic">Swimwear</p>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 py-12">
        <div class="glass-card p-8 md:p-12 rounded-[3rem] shadow-2xl max-w-xl w-full border border-white/20">
            <header class="text-center mb-10">
                <h3 class="text-4xl serif italic text-[#964b00] mb-2">Bize Yazın</h3>
                <div class="w-12 h-1 bg-[#964b00]/20 mx-auto mb-4"></div>
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Sorularınız için yanınızdayız</p>
            </header>
            
            <form onsubmit="manuelMail(event)" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase tracking-[0.2em] ml-4 text-[#964b00]/70">Ad Soyad</label>
                    <input type="text" id="ad" required class="w-full bg-white/40 border border-[#964b00]/10 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-[#964b00] transition-all placeholder:text-gray-400 text-sm font-medium" placeholder="İsminizi yazın">
                </div>
                
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase tracking-[0.2em] ml-4 text-[#964b00]/70">Telefon</label>
                    <input type="tel" id="tel" required class="w-full bg-white/40 border border-[#964b00]/10 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-[#964b00] transition-all placeholder:text-gray-400 text-sm font-medium" placeholder="05XX XXX XX XX">
                </div>

                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase tracking-[0.2em] ml-4 text-[#964b00]/70">Mesajınız</label>
                    <textarea id="msg" rows="4" required class="w-full bg-white/40 border border-[#964b00]/10 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-[#964b00] transition-all placeholder:text-gray-400 text-sm font-medium resize-none" placeholder="Size nasıl yardımcı olabiliriz?"></textarea>
                </div>

                <button type="submit" class="w-full bg-[#964b00] text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-black transition-all shadow-lg active:scale-95 text-xs mt-2">
                    MAİL TASLAĞI OLUŞTUR
                </button>
            </form>
        </div>
    </main>

    <footer class="py-8 text-center bg-[#FAE29C]/50 mt-auto">
        <p class="text-[9px] text-[#964b00] font-bold uppercase tracking-[0.3em]">© 2026 QUAORA SWIMWEAR</p>
    </footer>

    <script>
        const overlay = document.getElementById("menuOverlay");

        function closeAllPanels() {
            document.getElementById("sideMenu").style.width = "0";
            if(overlay) overlay.classList.add("hidden");
        }

        function toggleMenu() {
            const menu = document.getElementById("sideMenu");
            // Mobil cihazlarda tam ekran, bilgisayarda 300px genişlikte açılır
            const targetWidth = window.innerWidth < 768 ? "100%" : "300px";
            
            const isOpen = menu.style.width === targetWidth;
            
            if (!isOpen) {
                menu.style.width = targetWidth;
                if(overlay) overlay.classList.remove("hidden");
            } else {
                closeAllPanels();
            }
        }

        function manuelMail(e) {
            e.preventDefault(); // Sayfanın yenilenmesini engeller

            const ad = document.getElementById('ad').value.trim();
            const tel = document.getElementById('tel').value.trim();
            const msg = document.getElementById('msg').value.trim();

            if(!ad || !tel || !msg) {
                alert("Lütfen tüm alanları doldurun.");
                return;
            }

            const body = `Müşteri Bilgileri:\n------------------\nAd: ${ad}\nTel: ${tel}\n\nMesaj:\n${msg}`;
            
            // Kullanıcıya ne olacağını haber veriyoruz
            alert("Şimdi varsayılan e-posta uygulamanız açılacak. Lütfen açılan ekrandan 'Gönder' butonuna basmayı unutmayın.");

            // Mail adresini quaoratr@gmail.com olarak ayarladık
            window.location.href = `mailto:quaoratr@gmail.com?subject=Quaora İletişim Formu&body=${encodeURIComponent(body)}`;
        }
    </script>
</body>
</html>
